name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      # Commitlint needs both ends of the PR/push range, not a shallow checkout.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Conventional Commits — pull request commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run lint:commits -- --from "$BASE_SHA" --to "$HEAD_SHA"

      # GitHub uses the PR title as the subject of a squash-merge commit.
      - name: Conventional Commits — pull request title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npm run lint:commits

      - name: Conventional Commits — pushed range
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            npm run lint:commits -- --from "$BEFORE_SHA" --to "$HEAD_SHA"
          else
            # First/rewritten push where GitHub's before SHA is unavailable.
            npm run lint:commits -- --last
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # Env values are placeholders — nothing in the build talks to Supabase
      # or Resend (all env access in lib/ is lazy, inside request-time
      # functions).
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          NEXT_PUBLIC_APP_URL: https://ci-placeholder.invalid
          RESEND_API_KEY: re_ci_placeholder

  migrations:
    name: Migration sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Migrations are applied in filename order (supabase db push / SQL
      # editor). Catch the two mistakes that silently reorder or shadow them:
      # a file that doesn't follow the NNN_ convention, and two files claiming
      # the same number (easy to do on parallel branches).
      - name: Filenames are numbered and unique
        working-directory: supabase/migrations
        run: |
          failed=0

          bad=$(ls *.sql | grep -vE '^[0-9]{3}_[a-z0-9_]+\.sql$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Migration filenames must match NNN_snake_case.sql:"
            echo "$bad"
            failed=1
          fi

          dups=$(ls *.sql | cut -c1-3 | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate migration number(s): $(echo $dups | tr '\n' ' ')"
            ls *.sql | grep -E "^($(echo $dups | tr ' ' '|'))_"
            failed=1
          fi

          exit $failed

  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Unauthenticated smoke against the dev server with placeholder env —
      # see playwright.config.ts (authed e2e is tracked in ROADMAP.md).
      - name: Run smoke tests
        run: npm run test:e2e
