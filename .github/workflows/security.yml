name: Security

# Security automation for a PUBLIC repository.
#
# Policy: BLOCK PRs, TRIAGE main in the Security tab.
#   - On `pull_request`, any finding fails the check and gates the merge.
#   - On `push` to main and on the weekly `schedule`, scans run and publish:
#     CodeQL uploads SARIF to code scanning (Security tab) where alerts are
#     visible, triageable, and dismissable; the other scanners report via the
#     run log. Failing pushes for pre-existing findings would be noise — the
#     exception is the dependency audit, which always fails on high+ CVEs in
#     production dependencies so a newly published advisory is loud.
#   - The weekly schedule exists so new CodeQL queries and new advisories are
#     caught even when no code has changed.
#
# Supply chain: every action is pinned to a full commit SHA and the Semgrep
# image to a digest; .github/dependabot.yml keeps the pins fresh.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, Monday 05:30 UTC — new queries/advisories without a push.
    - cron: '30 5 * * 1'

# Least privilege by default; the CodeQL job adds security-events: write for
# SARIF upload.
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Secret scanning — highest value here given service-role / Resend keys.
  #    TruffleHog is license-free and verifies whether a found secret is LIVE.
  #    .env / .env.local are gitignored; this guards against accidental commits.
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so a PR can be scanned across its whole commit range,
          # not just the tip.
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        # The action exits non-zero when a verified (live) secret is found.
        # Block PRs / report on main+schedule.
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        with:
          # PR: scan only the commits the PR introduces (base..head).
          # Push/schedule: defaults to the pushed range / full history.
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # Report verified (live) AND unknown secrets; failure gates PRs only.
          extra_args: --results=verified,unknown

  # ---------------------------------------------------------------------------
  # 2. SAST — Semgrep. Next.js/React/TS/OWASP/secrets rulesets. No token needed.
  # ---------------------------------------------------------------------------
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep:1.169.0@sha256:2b33f46ba66cf8cc2ad59ccfa7d22951fd00c632c38f1339e84ec8e6e641a942
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Semgrep scan
        run: |
          set -o pipefail
          # On a PR, --error makes Semgrep exit non-zero on any finding (gates
          # the merge). On main/schedule we drop --error and report only.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ERR="--error"
          else
            ERR=""
          fi
          semgrep scan $ERR \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/nextjs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --metrics off

  # ---------------------------------------------------------------------------
  # 3. SAST — CodeQL, standard analyze/upload flow. Findings land in the
  #    Security tab (free code scanning on public repos) where they can be
  #    triaged and dismissed. PRs are ALSO gated deterministically on the local
  #    SARIF, so merge-blocking doesn't depend on branch-protection settings.
  # ---------------------------------------------------------------------------
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze and upload to code scanning
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          # Also emit SARIF locally so the PR gate below stays deterministic.
          output: codeql-results

      - name: Gate PRs on findings
        if: github.event_name == 'pull_request'
        run: |
          count=$(python3 - <<'PY'
          import glob, json, sys
          total = 0
          for f in glob.glob("codeql-results/*.sarif"):
              data = json.load(open(f))
              for run in data.get("runs", []):
                  for res in run.get("results", []):
                      total += 1
                      rule = res.get("ruleId", "?")
                      msg = res.get("message", {}).get("text", "")
                      loc = (res.get("locations") or [{}])[0].get("physicalLocation", {})
                      art = loc.get("artifactLocation", {}).get("uri", "?")
                      line = loc.get("region", {}).get("startLine", "?")
                      print(f"::error file={art},line={line}::[{rule}] {msg}", file=sys.stderr)
          print(total)
          PY
          )
          echo "CodeQL findings: $count"
          if [ "$count" -gt 0 ]; then
            echo "Failing PR: CodeQL found $count issue(s). See the Security tab for triage."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # 4. Dependency audit — known CVEs in PRODUCTION dependencies. Fails on
  #    every event (PR, main, schedule): a high/critical advisory against a
  #    prod dependency is always actionable, and a failing scheduled run is
  #    the notification that a new advisory was published.
  # ---------------------------------------------------------------------------
  dependencies:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, high+critical)
        run: npm audit --omit=dev --audit-level=high

  # ---------------------------------------------------------------------------
  # 5. Supabase RLS guard — every migration that CREATEs a table must also
  #    ENABLE ROW LEVEL SECURITY on it. RLS is the only thing between trainee
  #    data and the anon key. Service-role *usage* is intentionally widespread
  #    and is deliberately NOT flagged (would be pure noise).
  # ---------------------------------------------------------------------------
  supabase-rls:
    name: Supabase RLS guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need history to diff against the base and see which migrations the
          # change actually touches.
          fetch-depth: 0

      - name: New tables must enable RLS
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          # Only inspect migrations CHANGED by this push/PR — pre-existing RLS
          # debt (tracked separately) must not block unrelated changes. A new
          # table is OK if ANY migration in the repo enables RLS on it (this
          # repo sometimes splits the CREATE and the ENABLE across files, e.g.
          # attendance_evidence in 014 + 015_attendance_evidence_rls.sql).
          base="$BASE_SHA"
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base=$(git rev-parse origin/main 2>/dev/null || echo "")
          fi
          if [ -n "$base" ]; then
            changed=$(git diff --name-only "$base" "$HEAD_SHA" -- 'supabase/migrations/*.sql')
          else
            # No usable base (e.g. first push) — fall back to scanning all.
            changed=$(ls supabase/migrations/*.sql 2>/dev/null)
          fi

          if [ -z "$changed" ]; then
            echo "No migration changes to check."
            exit 0
          fi
          echo "Checking migrations:"; echo "$changed"

          failed=0
          for f in $changed; do
            [ -f "$f" ] || continue
            tables=$(grep -ioE 'create table( if not exists)?[[:space:]]+[a-z0-9_."]+' "$f" \
              | sed -E 's/.*create table( if not exists)?[[:space:]]+//I; s/"//g; s/^[a-z0-9_]+\.//I' \
              | tr 'A-Z' 'a-z' | sort -u)
            [ -z "$tables" ] && continue
            for t in $tables; do
              # Is RLS enabled on this table in ANY migration?
              if ! grep -riE "alter table[[:space:]]+([a-z0-9_]+\.)?\"?${t}\"?[[:space:]]+enable row level security" supabase/migrations/ >/dev/null; then
                echo "::error file=${f}::Table '${t}' is created without ENABLE ROW LEVEL SECURITY (not enabled in any migration)"
                failed=1
              fi
            done
          done

          if [ "$failed" -ne 0 ]; then
            if [ "$IS_PR" = "true" ]; then
              echo "Failing PR: one or more new tables lack RLS."
              exit 1
            fi
            echo "::warning::One or more new tables lack RLS (reporting only on main)."
          fi
